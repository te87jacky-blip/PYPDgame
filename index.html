<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>戰鬥陀螺Beyblade X賽事系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"微軟正黑體",sans-serif}
  body{margin:0;padding:12px;color:#fff;position:relative;min-height:100vh;background:#0a0f1a}
  body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background-repeat:repeat;background-position:center;filter:brightness(0.6) saturate(1.15);z-index:-1}
  body.has-bg::before{background-image:var(--bg);}
  h2{margin:0 0 10px;font-size:24px;font-weight:900;letter-spacing:1px;text-shadow:0 2px 8px rgba(0,0,0,.4);cursor:pointer}
.card{background:rgba(15,23,42,0.65);border-radius:14px;padding:14px;margin-bottom:10px;backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.08)}
  input,button,select{width:100%;padding:14px;border-radius:10px;border:none;margin:5px 0;font-size:16px}
  input,select{background:#334155;color:#fff;text-align:center}
  button{background:#3b82f6;color:#fff;font-weight:600;min-height:48px}
  button.danger{background:#ef4444}
  button.ghost{background:#475569;padding:8px 12px;font-size:14px;width:auto;min-height:40px}
  button:disabled{background:#475569;opacity:0.6}
.player{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:12px;margin:6px 0;background:rgba(15,23,42,0.8);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08)}
.player-info{display:flex;flex-direction:column;gap:4px}
.player-name{font-size:17px;font-weight:600}
.player-stat{font-size:15px;color:#facc15;font-weight:700}
.player-btns{display:flex;gap:6px}
.player-btns button{width:auto;padding:8px 14px;font-size:14px;min-height:40px}
.podium{display:flex;justify-content:center;align-items:end;gap:8px;margin:16px 0}
.podium-card{width:30%;padding:12px;border-radius:12px;text-align:center;font-weight:700}
.podium-card.gold{background:linear-gradient(180deg,#ffd700,#f4c430);color:#000}
.podium-card.silver{background:linear-gradient(180deg,#e8e8e8,#c0c0c0);color:#000}
.podium-card.bronze{background:linear-gradient(180deg,#cd7f32,#b8860b);color:#fff}
.podium-card.rank{font-size:30px;margin-bottom:4px}
.podium-card.name{font-size:15px;margin-bottom:4px}
.podium-card.pts{font-size:13px;opacity:.9}
.match{background:rgba(15,23,42,0.5);backdrop-filter:blur(6px);padding:16px;border-radius:14px;margin:10px 0;border:1px solid rgba(255,255,255,0.08)}
.match-header{text-align:center;margin-bottom:12px}
.match-name{font-size:17px;font-weight:700}
.score-wrap{display:flex;justify-content:space-between;align-items:center;gap:8px}
.score-side{display:flex;gap:4px;flex-wrap:wrap;width:42%;justify-content:center}
.score-btn{width:44px;height:44px;border-radius:10px;background:#475569;font-weight:800;font-size:19px;border:2px solid transparent;text-align:center;display:flex;align-items:center;justify-content:center}
.score-btn.active{border:2px solid #22c55e;background:#0f172a;box-shadow:0 0 10px #22c55e66;color:#22c55e}
.score-btn:active{background:#3b82f6;color:#fff}
.vs{color:#94a3b8;font-size:13px;font-weight:600}
.row{display:flex;gap:8px;align-items:center}
.row input{flex:1}
.qr-wrap{display:flex;justify-content:center;margin:8px 0}
.qr{padding:10px;background:#fff;border-radius:12px}
.loading{color:#94a3b8;text-align:center;padding:20px}
.bracket{display:flex;gap:12px;overflow-x:auto;padding:10px 0}
.bracket-round{display:flex;flex-direction:column;gap:10px;min-width:200px}
.bracket-match{background:#334155;padding:10px;border-radius:8px;border:2px solid #475569}
.bracket-match.winner{border:2px solid #22c55e!important;box-shadow:0 0 10px #22c55e66}
.bracket-player{padding:12px;border-radius:8px;margin:4px 0;background:#1e293b;text-align:center;font-weight:600;min-height:44px;display:flex;align-items:center;justify-content:center}
.bracket-player.loser{opacity:0.35;text-decoration:line-through}
.bracket-player.bye{background:#0f172a;border:1px dashed #475569;color:#22c55e}
.bracket-player.clickable:active{background:#3b82f6;color:#fff}
</style>
</head>
<body>
<div class="card">
  <h2 id="title" ondblclick="editTitle()">🏆 Beyblade X</h2>
  <div class="row">
    <input id="pName" placeholder="輸入選手名字" style="font-size:16px">
    <button onclick="addPlayer()" style="width:auto">加入</button>
  </div>
  <div id="players"><div class="loading">讀取中...</div></div>

  <div class="row" style="margin-top:8px">
    <select id="mode" onchange="changeMode()">
      <option value="swiss" selected>瑞士制</option>
      <option value="single">單淘汰</option>
    </select>
    <select id="totalRounds" onchange="changeRounds()">
      <option value="3">3輪</option>
      <option value="4" selected>4輪</option>
      <option value="5">5輪</option>
      <option value="6">6輪</option>
    </select>
  </div>
  <div class="row" style="margin-top:4px">
    <button onclick="startTournament()" id="startBtn" disabled>開始比賽</button>
    <button class="ghost" onclick="resetTournament()">重開</button>
  </div>
</div>

<div class="card" id="matchCard" style="display:none">
  <h2 id="roundTitle">第1輪</h2>
  <div id="matches"></div>
  <button onclick="nextRound()">提交本輪 → 下一輪</button>
</div>

<div class="card" id="bracketCard" style="display:none">
  <h2>單淘汰賽程</h2>
  <div id="bracket" class="bracket"></div>
</div>

<div class="card" id="podiumCard" style="display:none">
  <h2>🏅 決賽排名</h2>
  <div id="podium" class="podium"></div>
</div>

<div class="card" style="padding:10px">
  <div class="qr-wrap"><div id="qrcode" class="qr"></div></div>
</div>

<script>
const ROOM_ID = location.pathname.split('/').pop() || 'default';
let state = {players:[],round:0,totalRounds:4,title:'🏆 Beyblade X',bgUrl:'',mode:'swiss',bracket:[],started:false,currentMatches:[]};

async function loadState(){
  try{
    const res = await fetch(`/api/state?room=${ROOM_ID}`);
    if(res.ok) state = await res.json();
  }catch(e){}
  applyState();
}

async function saveState(){
  await fetch('/api/state',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)});
}

function applyState(){
  document.getElementById('title').textContent = state.title;
  document.getElementById('totalRounds').value = state.totalRounds;
  document.getElementById('mode').value = state.mode;
  if(state.bgUrl){document.body.style.setProperty('--bg',`url(${state.bgUrl})`);document.body.classList.add('has-bg');}
  renderPlayers();
}

function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}
function sortPlayers(){return state.players.sort((a,b)=>b.win-a.win||a.lose-b.lose||b.total-a.total||b.buchholz-a.buchholz);}

function renderPlayers(){
  sortPlayers();
  document.getElementById('players').innerHTML = state.players.map((p,i)=>
    `<div class="player">
      <div class="player-info">
        <span class="player-name">${i+1}. ${p.name}</span>
        <span class="player-stat">${p.win}勝 ${p.lose}敗 ${p.total}分</span>
      </div>
      <div class="player-btns">
        <button onclick="editPlayer(${i})">改</button>
        <button class="danger" onclick="delPlayer(${i})">刪</button>
      </div>
    </div>`
  ).join('') || '<div class="loading">還沒人報名</div>';

  const swissFinished = state.mode==='swiss' && state.round > state.totalRounds;
  const singleFinished = state.mode==='single' && state.bracket.length>0 && state.bracket[state.bracket.length-1][0]?.w;
  const finished = swissFinished || singleFinished;

  document.getElementById('startBtn').disabled = state.players.length<4 || state.started || finished;
  document.getElementById('startBtn').textContent = finished?'查看排名':state.mode==='swiss'?`開始第${state.round+1}輪`:'開始比賽';

  if(state.mode==='swiss' && state.round>0 && state.started &&!swissFinished) renderSwissMatches();
  if(state.mode==='single' && state.started) renderBracket();
  if(swissFinished) showPodium();
  genQR();
}

async function addPlayer(){
  const name = document.getElementById('pName').value.trim();
  if(!name||state.players.find(p=>p.name===name)) return;
  state.players.push({name,total:0,win:0,lose:0,buchholz:0,opponents:[],alive:true});
  document.getElementById('pName').value='';
  await saveState(); renderPlayers();
}
async function editPlayer(i){
  const newName = prompt('修改選手名字:',state.players[i].name);
  if(newName && newName.trim()) {state.players[i].name=newName.trim();await saveState();renderPlayers();}
}
async function delPlayer(i){
  if(confirm(`確定刪除 ${state.players[i].name}？`)){state.players.splice(i,1);await saveState();renderPlayers();}
}
async function resetTournament(){
  if(confirm('確定重開賽程？所有成績會清空')){
    state.players.forEach(p=>{p.total=0;p.win=0;p.lose=0;p.buchholz=0;p.opponents=[];p.alive=true});
    state.round=0; state.started=false; state.bracket=[]; state.currentMatches=[];
    await saveState(); renderPlayers();
    document.getElementById('matchCard').style.display='none';
    document.getElementById('bracketCard').style.display='none';
    document.getElementById('podiumCard').style.display='none';
  }
}
async function changeRounds(){state.totalRounds=parseInt(document.getElementById('totalRounds').value);await saveState();}
async function changeMode(){
  state.mode=document.getElementById('mode').value;
  state.started=false;
  state.round=0;
  state.currentMatches=[];
  state.bracket=[];
  await saveState();
  document.getElementById('matchCard').style.display='none';
  document.getElementById('bracketCard').style.display='none';
  document.getElementById('podiumCard').style.display='none';
  renderPlayers();
}

async function startTournament(){
  if(state.mode==='swiss') return startSwiss();
  if(state.mode==='single') return startSingle();
}

// 瑞士制
async function startSwiss(){
  state.started=true;
  state.round=1;
  generateSwissMatches();
  await saveState();
  document.getElementById('matchCard').style.display='block';
  document.getElementById('bracketCard').style.display='none';
  document.getElementById('roundTitle').textContent=`
