<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>戰鬥陀螺Beyblade X賽事系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"微軟正黑體",sans-serif}
  body{margin:0;padding:16px;color:#fff;position:relative;min-height:100vh;background:#0a0f1a}
  body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background-repeat:repeat;background-position:center;filter:brightness(0.6) saturate(1.15);z-index:-1}
  body.has-bg::before{background-image:var(--bg);}
  h2{margin:0 0 12px;font-size:28px;font-weight:900;letter-spacing:1px;text-shadow:0 2px 8px rgba(0,0,0,.4);cursor:pointer}
  h2:active{transform:scale(.98)}
 .card{background:#1e293b/65;border-radius:14px;padding:16px;margin-bottom:12px;backdrop-filter:blur(4px);border:1px solid #334155}
  input,button,select{width:100%;padding:12px;border-radius:8px;border:none;margin:6px 0;font-size:16px}
  input,select{background:#334155;color:#fff;text-align:center}
  button{background:#3b82f6;color:#fff;font-weight:600}
  button.danger{background:#ef4444}
  button.ghost{background:#475569;padding:6px 10px;font-size:13px;width:auto}
  button:disabled{background:#475569}
 .player{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:10px;margin:6px 0;background:#0f172a/80;backdrop-filter:blur(8px);border:1px solid #334155}
 .player-info{display:flex;flex-direction:column;gap:4px}
 .player-name{font-size:18px;font-weight:600;letter-spacing:0.5px}
 .player-stat{font-size:16px;color:#facc15;font-weight:700;letter-spacing:0.3px}
 .player-btns{display:flex;gap:6px}
 .player-btns button{width:auto;padding:6px 12px;font-size:14px;font-weight:600}
 .podium{display:flex;justify-content:center;align-items:end;gap:8px;margin:16px 0}
 .podium-card{width:30%;padding:12px;border-radius:12px;text-align:center;font-weight:700}
 .podium-card.gold{background:linear-gradient(180deg,#ffd700,#f4c430);color:#000}
 .podium-card.silver{background:linear-gradient(180deg,#e8e8e8,#c0c0c0);color:#000}
 .podium-card.bronze{background:linear-gradient(180deg,#cd7f32,#b8860b);color:#fff}
 .podium-card.rank{font-size:32px;margin-bottom:4px}
 .podium-card.name{font-size:16px;margin-bottom:4px}
 .podium-card.pts{font-size:14px;opacity:.9}
 .match{background:#334155;padding:12px;border-radius:8px;margin:8px 0}
 .score-row{display:grid;grid-template-columns:1fr 50px 1fr;gap:8px;align-items:center;margin:8px 0}
 .vs{color:#94a3b8;font-size:14px;text-align:center}
 .pts{font-size:12px;color:#94a3b8;text-align:center;margin-top:4px}
 .row{display:flex;gap:8px;align-items:center}
 .row input{flex:1}
 .qr-wrap{display:flex;justify-content:center;margin:12px 0}
 .qr{padding:8px;background:#fff;border-radius:8px}
 .loading{color:#94a3b8;text-align:center;padding:20px}
 .bracket{display:flex;gap:16px;overflow-x:auto;padding:12px 0}
 .bracket-round{display:flex;flex-direction:column;gap:12px;min-width:220px}
 .bracket-match{background:#334155;padding:10px;border-radius:8px;border:1px solid #475569}
 .bracket-match.winner{border-color:#22c55e}
 .bracket-player{padding:8px;border-radius:6px;margin:4px 0;background:#1e293b;text-align:center;font-weight:600}
 .bracket-player.loser{opacity:0.35;text-decoration:line-through}
 .bracket-player.bye{background:#0f172a;border:1px dashed #475569;color:#22c55e}
 .bracket-player.clickable{cursor:pointer}
 .bracket-player.clickable:hover{background:#3b82f6;color:#fff}
</style>
</head>
<body>
<div class="card">
  <h2 id="title" ondblclick="editTitle()">🏆 Beyblade X 賽事系統</h2>
  <div class="row">
    <input id="pName" placeholder="輸入選手名字">
    <button onclick="addPlayer()" style="width:auto">加入</button>
  </div>
  <div id="players"><div class="loading">讀取中...</div></div>

  <div class="row" style="margin-top:10px">
    <select id="mode" onchange="changeMode()">
      <option value="swiss" selected>瑞士制</option>
      <option value="single">單淘汰</option>
    </select>
    <select id="totalRounds" onchange="changeRounds()">
      <option value="3">共3輪</option>
      <option value="4" selected>共4輪</option>
      <option value="5">共5輪</option>
      <option value="6">共6輪</option>
    </select>
    <button onclick="startTournament()" id="startBtn" disabled>開始比賽</button>
    <button class="ghost" onclick="resetTournament()">重開</button>
  </div>
  <div class="pts" id="stats"></div>
</div>

<div class="card" id="matchCard" style="display:none">
  <h2 id="roundTitle">第1輪</h2>
  <div id="matches"></div>
  <button onclick="nextRound()">提交本輪 → 下一輪</button>
</div>

<div class="card" id="bracketCard" style="display:none">
  <h2 id="bracketTitle">單淘汰賽程</h2>
  <div id="bracket" class="bracket"></div>
</div>

<div class="card" id="podiumCard" style="display:none">
  <h2>🏅 決賽排名</h2>
  <div id="podium" class="podium"></div>
</div>

<div class="card">
  <h2>報名QR碼</h2>
  <div class="qr-wrap"><div id="qrcode" class="qr"></div></div>
  <small id="urlText"></small>
</div>

<script>
const ROOM_ID = location.pathname.split('/').pop() || 'default';
let state = {players:[],round:0,totalRounds:4,title:'🏆 Beyblade X 賽事系統',bgUrl:'',mode:'swiss',bracket:[],started:false};

async function loadState(){
  try{
    const res = await fetch(`/api/state?room=${ROOM_ID}`);
    if(res.ok) state = await res.json();
  }catch(e){console.log('載入失敗',e)}
  applyState();
}

async function saveState(){
  try{
    await fetch('/api/state',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)});
  }catch(e){console.log('儲存失敗',e)}
}

function applyState(){
  document.getElementById('title').textContent = state.title;
  document.getElementById('totalRounds').value = state.totalRounds;
  document.getElementById('mode').value = state.mode;
  if(state.bgUrl){document.body.style.setProperty('--bg',`url(${state.bgUrl})`);document.body.classList.add('has-bg');}
  renderPlayers();
}

function sortPlayers(){
  return state.players.sort((a,b)=>{
    if(b.win!== a.win) return b.win - a.win;
    if(a.lose!== b.lose) return a.lose - b.lose;
    if(b.total!== a.total) return b.total - a.total;
    return b.buchholz - a.buchholz;
  });
}

function renderPlayers(){
  sortPlayers();
  document.getElementById('players').innerHTML = state.players.map((p,i)=>
    `<div class="player">
      <div class="player-info">
        <span class="player-name">${i+1}. ${p.name}</span>
        <span class="player-stat">${p.win}勝 ${p.lose}敗 ${p.total}分</span>
      </div>
      <div class="player-btns">
        <button onclick="editPlayer(${i})">改</button>
        <button class="danger" onclick="delPlayer(${i})">刪</button>
      </div>
    </div>`
  ).join('') || '<div class="loading">還沒人報名</div>';

  const hasStarted = state.started;
  document.getElementById('startBtn').disabled = state.players.length<4 || hasStarted;
  document.getElementById('startBtn').textContent= hasStarted?'比賽進行中':'開始比賽';

  if(state.mode==='swiss' && state.round>0 &&!hasStarted) renderSwissMatches();
  if(state.mode==='single' && state.started) renderBracket();
  if(state.mode==='swiss' && state.round>=state.totalRounds) showPodium();
  genQR();
}

async function addPlayer(){
  const name = document.getElementById('pName').value.trim();
  if(!name||state.players.find(p=>p.name===name)) return;
  state.players.push({name,total:0,win:0,lose:0,buchholz:0,opponents:[],alive:true});
  document.getElementById('pName').value='';
  await saveState(); renderPlayers();
}

async function editPlayer(i){
  const newName = prompt('修改選手名字:',state.players[i].name);
  if(newName && newName.trim()) {state.players[i].name=newName.trim();await saveState();renderPlayers();}
}

async function delPlayer(i){
  if(confirm(`確定刪除 ${state.players[i].name}？`)){state.players.splice(i,1);await saveState();renderPlayers();}
}

async function resetTournament(){
  if(confirm('確定重開賽程？所有成績會清空')){
    state.players.forEach(p=>{p.total=0;p.win=0;p.lose=0;p.buchholz=0;p.opponents=[];p.alive=true});
    state.round=0; state.started=false; state.bracket=[];
    await saveState(); renderPlayers();
    document.getElementById('matchCard').style.display='none';
    document.getElementById('bracketCard').style.display='none';
    document.getElementById('podiumCard').style.display='none';
  }
}

async function changeRounds(){
  state.totalRounds = parseInt(document.getElementById('totalRounds').value);
  await saveState();
}

async function changeMode(){
  state.mode = document.getElementById('mode').value;
  await saveState();
}

async function startTournament(){
  if(state.mode==='swiss') return startSwiss();
  if(state.mode==='single') return startSingle();
}

async function startSwiss(){
  state.started=true;
  state.round=1;
  generateSwissMatches();
  await saveState();
  document.getElementById('matchCard').style.display='block';
  document.getElementById('roundTitle').textContent=`第${state.round}輪 / 共${state.totalRounds}輪`;
  renderSwissMatches();
}

function generateSwissMatches(){
  sortPlayers();
  const matches=[]; const paired=new Set();
  for(let i=0;i<state.players.length;i++){
    if(paired.has(i)) continue;
    for(let j=i+1;j<state.players.length;j++){
      if(paired.has(j)) continue;
      if(!state.players[i].opponents.includes(state.players[j].name)){
        matches.push([state.players[i],state.players[j]]);paired.add(i);paired.add(j);break;
      }
    }
  }
  if(state.players.length%2===1 &&!paired.has(state.players.length-1)){
    state.players[state.players.length-1].total+=3;state.players[state.players.length-1].win+=1;
  }
  window.currentMatches=matches;
}

function renderSwissMatches(){
  document.getElementById('matches').innerHTML = window.currentMatches.map((m,i)=>
    `<div class="match">
      <div class="score-row">
        <span>${m[0].name}</span><span class="vs">VS</span><span>${m[1].name}</span>
        <input id="s${i}0" type="number" min="0" max="6" value="0" placeholder="0-6">
        <span class="vs">分</span>
        <input id="s${i}1" type="number" min="0" max="6" value="0" placeholder="0-6">
      </div>
      <div class="pts">輸入該場得分 0-6，先累積4分者獲勝</div>
    </div>`
  ).join('');
}

async function nextRound(){
  window.currentMatches.forEach((m,i)=>{
    const s0=Math.min(6,Math.max(0,parseInt(document.getElementById(`s${i}0`).value)||0));
    const s1=Math.min(6,Math.max(0,parseInt(document.getElementById(`s${i}1`).value)||0));
    if(s0||s1){
      m[0].total+=s0;m[1].total+=s1;
      if(s0>s1){m[0].win++;m[1].lose++;}else if(s1>s0){m[1].win++;m[0].lose++;}
      if(!m[0].opponents.includes(m[1].name)) m[0].opponents.push(m[1].name);
      if(!m[1].opponents.includes(m[0].name)) m[1].opponents.push(m[0].name);
    }
  });
  state.players.forEach(p=>{p.buchholz=p.opponents.reduce((s,n)=>s+(state.players.find(x=>x.name==n)?.total||0),0);});
  state.round++;
  if(state.round<=state.totalRounds) generateSwissMatches();
  await saveState(); renderPlayers();
  if(state.round<=state.totalRounds) renderSwissMatches();
  else document.getElementById('matchCard').style.display='none';
}

function showPodium(){
  const top3=sortPlayers().slice(0,3);
  if(top3.length===0) return;
  document.getElementById('podiumCard').style.display='block';
  document.getElementById('podium').innerHTML = `
    ${top3[1]?`<div class="podium-card silver"><div class="rank">🥈</div><div class="name">${top3[1].name}</div><div class="pts">${top3[1].win}勝 ${top3[1].lose}敗 ${top3[1].total}分</div></div>`:''}
    ${top3[0]?`<div class="podium-card gold"><div class="rank">🥇</div><div class="name">${top3[0].name}</div><div class="pts">${top3[0].win}勝 ${top3[0].lose}敗 ${top3[0].total}分</div></div>`:''}
    ${top3[2]?`<div class="podium-card bronze"><div class="rank">🥉</div><div class="name">${top3[2].name}</div><div class="pts">${top3[2].win}勝 ${top3[2].lose}敗 ${top3[2].total}分</div></div>`:''}
  `;
}

// 單淘汰核心
function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}

async function startSingle(){
  let alive = shuffle(state.players.filter(p=>p.alive).map(p=>p.name));
  const bye = alive.length%2===1? alive.pop() : null;

  state.bracket = [];
  const round1=[];
  for(let i=0;i<alive.length;i+=2){
    round1.push({p1:alive[i],p2:alive[i+1],w:null});
  }
  state.bracket.push(round1);

  // 預建後續輪次
  let nextLen = Math.ceil(alive.length/2);
  while(nextLen>1){
    state.bracket.push(Array(nextLen).fill(null).map(()=>({p1:null,p2:null,w:null})));
    nextLen = Math.ceil(nextLen/2);
  }
  state.bracket.push([{p1:null,p2:null,w:null}]); // 冠軍

  // 奇數輪空直接推進到第二輪
  if(bye){
    const secondRound = state.bracket[1];
    const idx = secondRound.findIndex(m=>!m.p1 ||!m.p2);
    if(idx!==-1){
      if(!secondRound[idx].p1) secondRound[idx].p1 = bye;
      else secondRound[idx].p2 = bye;
    }
  }

  state.started=true;
  await saveState(); renderBracket();
  document.getElementById('bracketCard').style.display='block';
}

function renderBracket(){
  document.getElementById('bracketCard').style.display='block';
  const roundNames = ['32強','16強','8強','4強','準決賽','決賽','冠軍'];
  const html = state.bracket.map((round,rIdx)=>{
    const name = round.length===1? '冠軍' : roundNames[Math.log2(state.players.length)-rIdx-1] || `第${rIdx+1}輪`;
    return `
      <div class="bracket-round">
        <div class="label">${name}</div>
        ${round.map((m,mIdx)=>renderBracketMatch(m,rIdx,mIdx)).join('')}
      </div>
    `
  }).join('');
  document.getElementById('bracket').innerHTML = html;
}

function renderBracketMatch(m,rIdx,mIdx){
  const p1 = m.p1 || '待定';
  const p2 = m.p2 || '待定';
  const w = m.w;
  const canClick =!w && p1!=='待定' && p2!=='待定';
  return `<div class="bracket-match ${w?'winner':''}">
    <div class="bracket-player ${w===p2?'loser':''} ${canClick?'clickable':''}" onclick="${canClick?`setWinner(${rIdx},${mIdx},'${p1}')`:''}">${p1}</div>
    <div class="bracket-player ${w===p1?'loser':''} ${canClick?'clickable':''}" onclick="${canClick?`setWinner(${rIdx},${mIdx},'${p2}')`:''}">${p2}</div>
  </div>`
}

async function setWinner(rIdx,mIdx,winner){
  const m = state.bracket[rIdx][mIdx];
  if(m.w) return;
  m.w = winner;

  const nextR = rIdx+1;
  if(state.bracket[nextR] && state.bracket[nextR][Math.floor(mIdx/2)]){
    const nextM = state.bracket[nextR][Math.floor(mIdx/2)];
    if(mIdx%2===0) nextM.p1 = winner; else nextM.p2 = winner;
  }
  await saveState(); renderBracket();

  // 冠軍產生
  const final = state.bracket[state.bracket.length-1][0];
  if(final && final.w){
    document.getElementById('podiumCard').style.display='block';
    document.getElementById('podium').innerHTML = `
      <div class="podium-card gold"><div class="rank">🥇</div><div class="name">${final.w}</div><div class="pts">冠軍</div></div>
    `;
  }
}

function genQR(){
  const url=location.href;
  document.getElementById('urlText').textContent=url;
  document.getElementById('qrcode').innerHTML='';
  new QRCode(document.getElementById('qrcode'),{text:url,width:140,height:140});
}

async function editTitle(){
  const newTitle = prompt('修改比賽名稱:',state.title);
  if(newTitle && newTitle.trim()){ state.title = newTitle.trim(); await saveState(); applyState(); }
}

document.body.ondblclick=(e)=>{
  if(e.target!==document.body) return;
  const url=prompt('貼上背景圖片網址:');
  if(url){state.bgUrl=url;saveState();applyState();}
}

loadState();
setInterval(loadState,5000);
</script>
</body>
</html>
