<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>戰鬥陀螺Beyblade X賽事系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"微軟正黑體",sans-serif}
  body{margin:0;padding:16px;color:#fff;position:relative;min-height:100vh;background:#0a0f1a}
  body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background-repeat:repeat;background-position:center;filter:brightness(0.6) saturate(1.15);z-index:-1}
  body.has-bg::before{background-image:var(--bg);}
  h2{margin:0 0 12px;font-size:28px;font-weight:900;letter-spacing:1px;text-shadow:0 2px 8px rgba(0,0,0,.4);cursor:pointer}
.card{background:#1e293b/65;border-radius:14px;padding:16px;margin-bottom:12px;backdrop-filter:blur(4px);border:1px solid #334155}
  input,button,select{width:100%;padding:12px;border-radius:8px;border:none;margin:6px 0;font-size:16px}
  input,select{background:#334155;color:#fff;text-align:center}
  button{background:#3b82f6;color:#fff;font-weight:600}
  button.danger{background:#ef4444}
  button.ghost{background:#475569;padding:6px 10px;font-size:13px;width:auto}
  button:disabled{background:#475569}
.player{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:10px;margin:6px 0;background:#0f172a/80;backdrop-filter:blur(8px);border:1px solid #334155}
.player-info{display:flex;flex-direction:column;gap:4px}
.player-name{font-size:18px;font-weight:600;letter-spacing:0.5px}
.player-stat{font-size:16px;color:#facc15;font-weight:700;letter-spacing:0.3px}
.player-btns{display:flex;gap:6px}
.player-btns button{width:auto;padding:6px 12px;font-size:14px;font-weight:600}
.podium{display:flex;justify-content:center;align-items:end;gap:8px;margin:16px 0}
.podium-card{width:30%;padding:12px;border-radius:12px;text-align:center;font-weight:700}
.podium-card.gold{background:linear-gradient(180deg,#ffd700,#f4c430);color:#000}
.podium-card.silver{background:linear-gradient(180deg,#e8e8e8,#c0c0c0);color:#000}
.podium-card.bronze{background:linear-gradient(180deg,#cd7f32,#b8860b);color:#fff}
.podium-card.rank{font-size:32px;margin-bottom:4px}
.podium-card.name{font-size:16px;margin-bottom:4px}
.podium-card.pts{font-size:14px;opacity:.9}
.match{background:#334155;padding:18px;border-radius:14px;margin:12px 0}
.match-header{text-align:center;margin-bottom:14px}
.match-name{font-size:18px;font-weight:700;letter-spacing:0.5px}
.score-wrap{display:flex;justify-content:space-between;align-items:center;gap:10px}
.score-side{display:flex;gap:5px;flex-wrap:wrap;width:40%;justify-content:center}
.score-btn{width:42px;height:42px;border-radius:8px;background:#475569;font-weight:800;font-size:18px;border:2px solid transparent;text-align:center;display:flex;align-items:center;justify-content:center}
.score-btn.active{border:2px solid #22c55e;background:#0f172a;box-shadow:0 0 10px #22c55e66;color:#22c55e}
.score-btn:active{background:#3b82f6;color:#fff}
.vs{color:#94a3b8;font-size:14px;font-weight:600}
.row{display:flex;gap:8px;align-items:center}
.row input{flex:1}
.qr-wrap{display:flex;justify-content:center;margin:12px 0}
.qr{padding:8px;background:#fff;border-radius:8px}
.loading{color:#94a3b8;text-align:center;padding:20px}
</style>
</head>
<body>
<div class="card">
  <h2 id="title" ondblclick="editTitle()">🏆 Beyblade X 賽事系統</h2>
  <div class="row">
    <input id="pName" placeholder="輸入選手名字">
    <button onclick="addPlayer()" style="width:auto">加入</button>
  </div>
  <div id="players"><div class="loading">讀取中...</div></div>

  <div class="row" style="margin-top:10px">
    <select id="mode" onchange="changeMode()">
      <option value="swiss" selected>瑞士制</option>
      <option value="single">單淘汰</option>
    </select>
    <select id="totalRounds" onchange="changeRounds()">
      <option value="3">共3輪</option>
      <option value="4" selected>共4輪</option>
      <option value="5">共5輪</option>
      <option value="6">共6輪</option>
    </select>
    <button onclick="startTournament()" id="startBtn" disabled>開始比賽</button>
    <button class="ghost" onclick="resetTournament()">重開</button>
  </div>
</div>

<div class="card" id="matchCard" style="display:none">
  <h2 id="roundTitle">第1輪</h2>
  <div id="matches"></div>
  <button onclick="nextRound()">提交本輪 → 下一輪</button>
</div>

<div class="card" id="podiumCard" style="display:none">
  <h2>🏅 決賽排名</h2>
  <div id="podium" class="podium"></div>
</div>

<div class="card">
  <h2>報名QR碼</h2>
  <div class="qr-wrap"><div id="qrcode" class="qr"></div></div>
  <small id="urlText"></small>
</div>

<script>
const ROOM_ID = location.pathname.split('/').pop() || 'default';
let state = {players:[],round:0,totalRounds:4,title:'🏆 Beyblade X 賽事系統',bgUrl:'',mode:'swiss',started:false,currentMatches:[]};

async function loadState(){
  try{
    const res = await fetch(`/api/state?room=${ROOM_ID}`);
    if(res.ok) state = await res.json();
  }catch(e){}
  applyState();
}

async function saveState(){
  await fetch('/api/state',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)});
}

function applyState(){
  document.getElementById('title').textContent = state.title;
  document.getElementById('totalRounds').value = state.totalRounds;
  document.getElementById('mode').value = state.mode;
  if(state.bgUrl){document.body.style.setProperty('--bg',`url(${state.bgUrl})`);document.body.classList.add('has-bg');}
  renderPlayers();
}

function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}
function sortPlayers(){return state.players.sort((a,b)=>b.win-a.win||a.lose-b.lose||b.total-a.total||b.buchholz-a.buchholz);}

function renderPlayers(){
  sortPlayers();
  document.getElementById('players').innerHTML = state.players.map((p,i)=>
    `<div class="player">
      <div class="player-info">
        <span class="player-name">${i+1}. ${p.name}</span>
        <span class="player-stat">${p.win}勝 ${p.lose}敗 ${p.total}分</span>
      </div>
      <div class="player-btns">
        <button onclick="editPlayer(${i})">改</button>
        <button class="danger" onclick="delPlayer(${i})">刪</button>
      </div>
    </div>`
  ).join('') || '<div class="loading">還沒人報名</div>';

  const swissFinished = state.mode==='swiss' && state.round > state.totalRounds;
  document.getElementById('startBtn').disabled = state.players.length<4 || state.started || swissFinished;
  document.getElementById('startBtn').textContent = swissFinished?'查看排名':`開始第${state.round+1}輪`;

  if(state.mode==='swiss' && state.round>0 && state.started &&!swissFinished) renderSwissMatches();
  if(swissFinished) showPodium();
  genQR();
}

async function addPlayer(){
  const name = document.getElementById('pName').value.trim();
  if(!name||state.players.find(p=>p.name===name)) return;
  state.players.push({name,total:0,win:0,lose:0,buchholz:0,opponents:[],alive:true});
  document.getElementById('pName').value='';
  await saveState(); renderPlayers();
}
async function editPlayer(i){
  const newName = prompt('修改選手名字:',state.players[i].name);
  if(newName && newName.trim()) {state.players[i].name=newName.trim();await saveState();renderPlayers();}
}
async function delPlayer(i){
  if(confirm(`確定刪除 ${state.players[i].name}？`)){state.players.splice(i,1);await saveState();renderPlayers();}
}
async function resetTournament(){
  if(confirm('確定重開賽程？所有成績會清空')){
    state.players.forEach(p=>{p.total=0;p.win=0;p.lose=0;p.buchholz=0;p.opponents=[];p.alive=true});
    state.round=0; state.started=false; state.currentMatches=[];
    await saveState(); renderPlayers();
    document.getElementById('matchCard').style.display='none';
    document.getElementById('podiumCard').style.display='none';
  }
}
async function changeRounds(){state.totalRounds=parseInt(document.getElementById('totalRounds').value);await saveState();}
async function changeMode(){state.mode=document.getElementById('mode').value;await saveState();}

async function startTournament(){
  state.started=true;
  state.round=1;
  generateSwissMatches();
  await saveState();
  document.getElementById('matchCard').style.display='block';
  document.getElementById('roundTitle').textContent=`第${state.round}輪 / 共${state.totalRounds}輪`;
  renderSwissMatches();
}

function generateSwissMatches(){
  const alive = shuffle(state.players.filter(p=>p.alive));
  const matches=[]; const paired=new Set();
  for(let i=0;i<alive.length;i++){
    if(paired.has(i)) continue;
    for(let j=i+1;j<alive.length;j++){
      if(paired.has(j)) continue;
      if(!alive[i].opponents.includes(alive[j].name)){
        matches.push({p1:alive[i].name,p2:alive[j].name,s1:0,s2:0});paired.add(i);paired.add(j);break;
      }
    }
  }
  if(alive.length%2===1 &&!paired.has(alive.length-1)){
    const bye = alive[alive.length-1];
    bye.total+=3;bye.win+=1;
  }
  state.currentMatches=matches;
}

function renderSwissMatches(){
  document.getElementById('matchCard').style.display='block';
  document.getElementById('roundTitle').textContent=`第${state.round}輪 / 共${state.totalRounds}輪`;
  document.getElementById('matches').innerHTML = state.currentMatches.map((m,i)=>
    `<div class="match">
      <div class="match-header">
        <div class="match-name">${m.p1} VS ${m.p2}</div>
      </div>
      <div class="score-wrap">
        <div class="score-side">${[0,1,2,3,4,5,6].map(n=>`<button class="score-btn ${m.s1===n?'active':''}" onclick="setScore(${i},0,${n})">${n}</button>`).join('')}</div>
        <div class="score-side">${[0,1,2,3,4,5,6].map(n=>`<button class="score-btn ${m.s2===n?'active':''}" onclick="setScore(${i},1,${n})">${n}</button>`).join('')}</div>
      </div>
    </div>`
  ).join('');
}

function setScore(i,side,val){
  state.currentMatches[i][side===0?'s1':'s2'] = val;
  renderSwissMatches();
  saveState();
}

async function nextRound(){
  state.currentMatches.forEach(m=>{
    const s0=m.s1||0, s1=m.s2||0;
    if(s0||s1){
      const p1 = state.players.find(p=>p.name===m.p1);
      const p2 = state.players.find(p=>p.name===m.p2);
      p1.total+=s0;p2.total+=s1;
      if(s0>s1){p1.win++;p2.lose++;}else if(s1>s0){p2.win++;p1.lose++;}
      if(!p1.opponents.includes(p2.name)) p1.opponents.push(p2.name);
      if(!p2.opponents.includes(p1.name)) p2.opponents.push(p1.name);
    }
  });
  state.players.forEach(p=>{p.buchholz=p.opponents.reduce((s,n)=>s+(state.players.find(x=>x.name==n)?.total||0),0);});
  state.round++;

  if(state.round<=state.totalRounds){
    generateSwissMatches();
    await saveState(); renderPlayers(); renderSwissMatches();
  }else{
    await saveState(); renderPlayers();
    document.getElementById('matchCard').style.display='none';
    showPodium();
  }
}

function showPodium(){
  const top3=sortPlayers().slice(0,3);
  if(top3.length===0) return;
  document.getElementById('podiumCard').style.display='block';
  document.getElementById('podium').innerHTML = `
    ${top3[1]?`<div class="podium-card silver"><div class="rank">🥈</div><div class="name">${top3[1].name}</div><div class="pts">${top3[1].win}勝 ${top3[1].lose}敗 ${top3[1].total}分</div></div>`:''}
    ${top3[0]?`<div class="podium-card gold"><div class="rank">🥇</div><div class="name">${top3[0].name}</div><div class="pts">${top3[0].win}勝 ${top3[0].lose}敗 ${top3[0].total}分</div></div>`:''}
    ${top3[2]?`<div class="podium-card bronze"><div class="rank">🥉</div><div class="name">${top3[2].name}</div><div class="pts">${top3[2].win}勝 ${top3[2].lose}敗 ${top3[2].total}分</div></div>`:''}
  `;
}

function genQR(){
  const url=location.href;
  document.getElementById('urlText').textContent=url;
  document.getElementById('qrcode').innerHTML='';
  new QRCode(document.getElementById('qrcode'),{text:url,width:140,height:140});
}
async function editTitle(){
  const newTitle = prompt('修改比賽名稱:',state.title);
  if(newTitle && newTitle.trim()){ state.title = newTitle.trim(); await saveState(); applyState(); }
}
document.body.ondblclick=(e)=>{
  if(e.target!==document.body) return;
  const url=prompt('貼上背景圖片網址:');
  if(url){state.bgUrl=url;saveState();applyState();}
}
loadState();
setInterval(loadState,3000);
</script>
</body>
</html>
